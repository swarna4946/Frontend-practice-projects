<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Dropdown</title>
  <style>
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }
    .dropdown ul {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      list-style: none;
      margin: 0;
      padding: 0;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      border-radius: 6px;
      z-index: 1;
    }
    .dropdown ul li a {
      display: block;
      padding: 12px 16px;
      color: black;
      text-decoration: none;
    }

    .dropdown ul li a:hover {
      background-color: #ddd;
    }

    .dropdown:hover ul {
      display: block;
    }
    .dropdown:hover button {
      background-color: #3e8e41;
    }
  </style>
</head>
<body>
  <div class="dropdown">
    <button>Fav Items</button>
    <ul>
      <li><a href="#">Croissant</a></li>
      <li><a href="#">Donut</a></li>
      <li><a href="#">Cookie</a></li>
      <li><a href="#">Sandwich</a></li>
    </ul>
  </div>
</body>
</html>

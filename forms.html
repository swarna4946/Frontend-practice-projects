<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <tr>
            <td>
                <label for="name">Enter The Name:</label></td>
                <td><input type="text" id="name">
            </td>
        </tr>
        <tr>
            <td>
                <label for="password">Password:</label></td>
                <td><input type="text" id="password">
            </td>
        </tr>
        <tr>
        <td><input type="radio" id="html" name="language" value="html"></td>
        <td><label for="html">HTML</label></td>
        </tr>
        <tr>
        <td><input type="radio" id="css" name="language" value="css"></td>
        <td><label for="css">CSS</label></td>
        </tr>
        <tr>
        <td><input type="radio" id="jss" name="language" value="jss"></td>
        <td><label for="jss">JSS</label></td>
        </tr>
        <tr>
        <td><input type="checkbox" id="1" name="language" value="1"></td>
        <td><label for="1">I Have A Car</label></td>
        </tr>
         <td><input type="checkbox" id="2" name="language" value="2"></td>
        <td><label for="2">I Have A Bike</label></td>
        </tr>
        <tr>
            <td>
                <label for="course">Choose a Course:</label></td>
                <td>
                <select>
                    <option>Java</option>
                    <option>Html</option>
                    <option>Jss</option>
                    <option>Python</option>
                    <option>Css</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>
                <label for="document">Upload Document:</label>
                           
            </td>
             <td>
                
                <input type="file" id="document">           
            </td>
        </tr>
        <tr><td><input type="submit">
        <input type="reset"></td></tr>

    </table>
</body>
</html>

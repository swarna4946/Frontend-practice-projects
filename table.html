<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    table{
      border: 2px ;
      width: 100%;
      border-collapse: collapse;
      height: 30px;
      border-color: rgb(208, 24, 190);
      border-style: dotted;
    }
    td{
      border: 2px solid rgb(208, 24, 190);
      width: 10%;
      border-collapse: collapse;
      text-align: center;
      border-style: dotted;
      height:30px;
    }
  </style>
  <body>
    <h3>Table in HTML</h3>
    <table>
      <tr>
        <td rowspan="2">A</td>
        <td colspan="1">B</td>
        <td rowspan="3">D</td>
        <td colspan="2">E</td>
        <td colspan="1">F</td>
    </tr>
    <tr >
        <td  colspan="1">C</td>
        <td rowspan="2">G</td>
        <td rowspan="2">H</td>
        <td rowspan="2">I</td>
    </tr>
    <tr>
        <td colspan="2">J</td>
    </tr>
    <tr>
        <td colspan="3">K</td>
        <td colspan="1">L</td>
        <td colspan="2">M</td>
    </tr>

    </table>
  </body>
</html>

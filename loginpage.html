<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginpage</title>
    <style>
        body{
            background-image:url(WhatsApp\ Image\ 2025-09-14\ at\ 14.42.54_f647d2cc.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            height: 100%;  
            display: flex; 
            justify-content: center;
            align-items: center;
        }
        h3{
            color:rgb(5, 3, 5);
            font-weight: 500;
        }
        .card{
            padding-right:50%;
            margin-top: 40px;
             width:50%;max-width:250px;background:rgba(189, 162, 162, 0.5);border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(2,6,23,0.2) ;
             font-family:'Times New Roman', Times, serif;
             font-size: small;
        }
        .button{
            border: 1px solid black;
            border-radius: 10px;
            background-color: rgb(103, 57, 108);
            background-size:center;
            margin-top: 10px;
        }
        label{
            font-size: small;
            color: rgb(0, 0, 0);
            float: left;
            margin:2px;
        }
        input{
            font-family: serif;
            font-size: small;
            padding:10px;
           
            border: 1px solid black;
            margin-bottom: 3px;
            border-radius: 5px;
            background-color: rgba(240, 224, 224, 0.5)
        }
    </style>
</head>
<body>
    <main class="container">
        <center>
        <form class="card" action="#" method="post">
            <h3>Login in to RideHer</h3>
            <label for="email">Email:</label>
            <input type="text" id="email" placeholder=" you@gmail.com">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder=" password">
            <button class="button" type="submit">Login</button>

        </form>
        </center>

    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller</title>
  <style>
    #b1{
      background-color: blue;
      color: antiquewhite;
      width: 80px;
      height: 35px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
    }
    #input{
      width: 70px;
      height: 25px;
      border-radius: 8px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }
    img {
      width: 100px;
      height: 100px;
      margin: 10px;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center; color: rgb(180, 14, 91); margin-top:50px;">Dice Roller</h1>
  <center>
    <label style="font-size: 20px;">Dice:</label>
    <input type="number" id="input" min="1" max="6">
    <button id="b1" onclick="rolldice()">Roll Dice</button>
    <p id="diceresult"></p>
    <div id="diceimages"></div>
  </center>

  <script>
    function rolldice() {
      const input = document.getElementById("input").value;
      const diceresult = document.getElementById("diceresult");
      const diceimages = document.getElementById("diceimages");

      let values = [];
      let images = [];

      for (let i = 0; i < input; i++) {
  const value = Math.floor(Math.random() * 6) + 1;
  values.push(value);
  images.push(`<img src="./dice_images/Dice-${value}.svg" alt="Dice ${value}">`);

}
diceimages.innerHTML = images.join('');
    }
  </script>
</body>
</html>
